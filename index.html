<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<title>呪術カードゲーム</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<h1>呪術カードゲーム</h1>


<div id="selectScreen">

    <h2>キャラクター選択</h2>

    <p>
        使用するキャラクターを3体選択してください
    </p>


    <div id="characterList"></div>


    <h3>選択中</h3>

    <div id="selectedCharacters"></div>


    <button id="startBattle">
        バトル開始
    </button>

</div>



<div id="game" style="display:none;">

    <div id="player">
        <h2>自分</h2>
        <div id="playerCharacters"></div>
    </div>


    <div id="enemy">
        <h2>相手</h2>
        <div id="enemyCharacters"></div>
    </div>


    <div id="hand">
        <h2>手札</h2>
        <div id="cards"></div>
    </div>


    <button id="endTurn">
        ターン終了
    </button>

</div>



<script src="js/data/characters.js"></script>
<script src="js/data/cards.js"></script>
<script src="js/data/effects.js"></script>

<script src="js/battle/damage.js"></script>
<script src="js/battle/turn.js"></script>
<script src="js/battle/deck.js"></script>
<script src="js/battle/battle.js"></script>

<script src="js/ui/title.js"></script>
<script src="js/ui/characterSelect.js"></script>
<script src="js/ui/deckBuilder.js"></script>
<script src="js/ui/battleUI.js"></script>

<script src="js/main.js"></script>

</body>
</html>
